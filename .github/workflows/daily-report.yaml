name: Daily LLM Report

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::blastula
            any::dplyr
            any::duckdb
            any::ggplot2
            any::lubridate
            any::purrr
            local::.

      - name: Overlay CodexBar data from data branch  # INTERIM #229 — remove when resolved
        continue-on-error: true
        run: |
          git fetch origin data || true
          git checkout origin/data -- inst/extdata/codexbar_usage.json inst/extdata/codexbar_cost_daily.json 2>/dev/null \
            || echo "No codexbar data on data branch yet — email will show 'not yet available'"

      - name: Build email HTML
        run: Rscript inst/scripts/send_daily_email.R --build-only

      - name: Validate email output
        run: bash inst/scripts/qa_email_output.sh /tmp/email_qa.html

      - name: Send Report
        # --send-only reads /tmp/email_qa.html (the validated artifact from the
        # "Build email HTML" step) and sends that exact content.  This guarantees
        # the emailed bytes == the QA-validated bytes (fixes roborev Finding 1).
        run: Rscript inst/scripts/send_daily_email.R --send-only
