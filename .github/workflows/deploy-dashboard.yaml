name: Deploy Shinylive Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'vignettes/**'
      - 'inst/extdata/**'
      - 'inst/scripts/export_dashboard_data.R'
      - '.github/workflows/deploy-dashboard.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure ci-failure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create ci-failure --repo "${{ github.repository }}" \
            --color B60205 --description "Automated CI failure tracker" 2>/dev/null || true

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::jsonlite
            any::dplyr
            any::DBI
            any::duckdb
            any::here
            any::tibble
            any::shinylive
            any::knitr
            any::rmarkdown
            any::DT
            any::lubridate
            any::blastula

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Install shinylive extension
        working-directory: vignettes
        run: quarto add quarto-ext/shinylive --no-prompt

      - name: Guard — parse {shinylive-r} chunk before render (issue #159)
        run: Rscript inst/scripts/check_shinylive_parse.R vignettes/dashboard_shinylive.qmd

      - name: Export dashboard data
        run: Rscript inst/scripts/export_dashboard_data.R

      - name: QA — validate exported data (fail early on empty/malformed)
        run: |
          python3 << 'PYEOF'
          import json, os, sys
          data_dir = "vignettes/data"
          critical = ["git_commits",
                      "git_bus_factor", "git_velocity", "git_timing",
                      "git_churn", "git_bugs"]
          # legacy_ccusage_daily/blocks: frozen snapshots since Phase 5a (#281/#302).
          # No longer live-written by cmonitor-rs; treat as optional for the deprecation
          # window (Phase 5b target 2026-09-02). Fixes #141.
          # (Renamed from ccusage_daily/ccusage_blocks in #281 Phase 2 / #284.)
          optional = ["legacy_ccusage_daily", "legacy_ccusage_blocks", "gemini_daily", "gemini_sessions",
                      "unified_sessions", "unified_costs", "git_tags",
                      "git_crisis", "git_todo", "predictions", "calibration_buckets"]
          def count_rows(d):
              if isinstance(d, list): return len(d)
              if isinstance(d, dict):
                  total = 0
                  for v in d.values():
                      if isinstance(v, list): total += len(v)
                      elif isinstance(v, dict):
                          for vv in v.values():
                              if isinstance(vv, list): total += len(vv)
                  return total
              return 0
          errors, warns = 0, 0
          print("=== Data QA ===")
          for f in critical:
              path = os.path.join(data_dir, f + ".json")
              if not os.path.exists(path):
                  print(f"ERROR: {f}.json missing"); errors += 1; continue
              rows = count_rows(json.load(open(path)))
              if rows == 0:
                  print(f"ERROR: {f}.json has 0 rows"); errors += 1
              else:
                  print(f"OK: {f}.json ({rows} rows)")
          for f in optional:
              path = os.path.join(data_dir, f + ".json")
              if not os.path.exists(path):
                  print(f"WARN: {f}.json missing (optional)"); warns += 1; continue
              rows = count_rows(json.load(open(path)))
              if rows == 0:
                  print(f"WARN: {f}.json empty (optional)"); warns += 1
              else:
                  print(f"OK: {f}.json ({rows} rows)")
          print(f"\n=== QA: {errors} errors, {warns} warnings ===")
          if errors > 0:
              print(f"::error::{errors} critical data files empty")
              sys.exit(1)
          PYEOF

      - name: Render dashboard
        working-directory: vignettes
        run: quarto render dashboard_shinylive.qmd

      # -----------------------------------------------------------------------
      # Guarded roborev page: install deps + render AFTER QA gate (#185 redo).
      # Both steps carry continue-on-error: true so a failure here CANNOT
      # empty the git_* exports, fail the QA gate, or block the dashboard deploy.
      # setup-r-dependencies package list is intentionally left unchanged.
      # -----------------------------------------------------------------------
      - name: Install package (for roborev_summary render)
        continue-on-error: true
        run: Rscript -e 'pak::local_install(".", ask = FALSE, dependencies = TRUE)'

      - name: Render roborev_summary.qmd
        continue-on-error: true
        working-directory: vignettes
        run: quarto render roborev_summary.qmd

      - name: Stage parquet assets for Shinylive DuckDB-WASM
        run: |
          mkdir -p vignettes/data/v1
          # Stage all three parquets used by DuckDB-WASM panels.
          # #83 Phase 5: added costs.parquet + git_commits.parquet for Cost per Commit chart.
          for PARQUET_NAME in sessions.parquet costs.parquet git_commits.parquet; do
            PARQUET_SRC="inst/extdata/telemetry/v1/${PARQUET_NAME}"
            PARQUET_DST="vignettes/data/v1/${PARQUET_NAME}"
            if [ ! -f "$PARQUET_SRC" ]; then
              echo "::error::$PARQUET_SRC is missing — DuckDB-WASM panels will not load"
              exit 1
            fi
            SIZE=$(stat -c%s "$PARQUET_SRC" 2>/dev/null || stat -f%z "$PARQUET_SRC" 2>/dev/null || echo "0")
            if [ "$SIZE" -lt 1024 ]; then
              echo "::error::$PARQUET_SRC is suspiciously small (${SIZE} bytes, expected >=1024)"
              exit 1
            fi
            cp "$PARQUET_SRC" "$PARQUET_DST"
            echo "Staged $PARQUET_SRC -> $PARQUET_DST (${SIZE} bytes)"
          done

      - name: Prepare pages artifact
        run: |
          mkdir -p _site
          cp vignettes/dashboard_shinylive.html _site/index.html
          cp -r vignettes/dashboard_shinylive_files _site/ 2>/dev/null || true
          cp vignettes/shinylive-sw.js _site/ 2>/dev/null || true
          cp -r vignettes/shinylive _site/ 2>/dev/null || true
          cp -r vignettes/data _site/data 2>/dev/null || true
          # Stage roborev summary page if render succeeded (guarded; does not
          # fail the artifact step when the file is absent — continue-on-error
          # on the render step already prevents that). Fixes #185.
          cp vignettes/roborev_summary.html _site/ 2>/dev/null || true
          cp -r vignettes/roborev_summary_files _site/ 2>/dev/null || true

      - name: Privacy gate — scan staged parquet for confidential projects (#83)
        run: |
          Rscript - << 'REOF'
          # Fail-closed: scan all staged parquet files in _site/data/ for
          # confidential project names before they are uploaded to Pages.
          # Uses DuckDB (already in package deps) — no Python needed for parquet.
          library(DBI)
          library(duckdb)

          CONFIDENTIAL <- c("mycare", "crypto", "crypto_solwatch", "crypto_swarms",
                             "solwatch", "swarms")

          conf_filter <- paste0(
            "lower(project) LIKE '%mycare%' OR lower(project) LIKE '%crypto%' OR ",
            "lower(project) IN ('solwatch','swarms') OR ",
            "(canonical_project IS NOT NULL AND (",
            "lower(canonical_project) LIKE '%mycare%' OR ",
            "lower(canonical_project) LIKE '%crypto%' OR ",
            "lower(canonical_project) IN ('solwatch','swarms')))"
          )

          parquet_files <- list.files("_site/data", pattern = "\\.parquet$",
                                       recursive = TRUE, full.names = TRUE)
          cat(sprintf("Scanning %d parquet file(s) in _site/data/\n", length(parquet_files)))

          violations <- 0L
          for (pf in parquet_files) {
            con <- dbConnect(duckdb(), dbdir = ":memory:")
            tryCatch({
              n <- dbGetQuery(
                con,
                sprintf("SELECT count(*) n FROM read_parquet('%s') WHERE %s",
                        pf, conf_filter)
              )[["n"]]
              if (n > 0L) {
                cat(sprintf("::error::PRIVACY GATE FAILED — %d confidential row(s) in %s\n", n, pf))
                violations <- violations + 1L
              } else {
                cat(sprintf("OK: %s (0 confidential rows)\n", pf))
              }
            }, error = function(e) {
              cat(sprintf("::warning::Could not scan %s: %s\n", pf, conditionMessage(e)))
            })
            dbDisconnect(con, shutdown = TRUE)
          }
          if (violations > 0L) {
            cat(sprintf("::error::Parquet privacy gate FAILED — %d file(s) contain confidential data\n",
                        violations))
            quit(status = 1L)
          }
          cat("Parquet privacy gate: PASSED\n")
          REOF

      - name: Privacy gate — block confidential projects from deploy (#83 Phase B)
        run: |
          python3 << 'PYEOF'
          import json, os, sys

          # Projects that must NEVER appear in deployed per-project JSON files.
          CONFIDENTIAL = {"mycare", "crypto", "crypto_solwatch", "crypto_swarms"}

          # Per-project JSON files that carry a "project" or "canonical_project" field.
          PER_PROJECT_FILES = [
            "cost_by_project_estimated.json",
            "tokens_by_project.json",
            "git_commits_by_project.json",
            "weekly_commits_by_project.json",
            "projects_master.json",
            "roborev_by_repo.json",
          ]

          data_dir = "_site/data"
          violations = []

          def project_values(obj):
              """Extract project-name strings from a JSON object or list."""
              vals = []
              if isinstance(obj, list):
                  for item in obj:
                      if isinstance(item, dict):
                          for key in ("project", "canonical_project", "repo"):
                              if key in item:
                                  vals.append(str(item[key]))
              elif isinstance(obj, dict):
                  for key in ("project", "canonical_project", "repo"):
                      if key in obj:
                          vals.append(str(obj[key]))
              return vals

          for fname in PER_PROJECT_FILES:
              path = os.path.join(data_dir, fname)
              if not os.path.exists(path):
                  continue
              try:
                  data = json.load(open(path))
              except Exception as e:
                  print(f"WARN: could not parse {fname}: {e}")
                  continue
              for pname in project_values(data):
                  # Check the base name before any branch suffix
                  base = pname.lower().split("-feat-")[0].split("-fix-")[0].split("-chore-")[0]
                  if base in CONFIDENTIAL or pname.lower() in CONFIDENTIAL:
                      violations.append(f"{fname}: project={pname!r}")

          if violations:
              for v in violations:
                  print(f"::error::PRIVACY GATE FAILED — confidential project in deploy: {v}")
              sys.exit(1)
          else:
              print("Privacy gate: no confidential project names found in per-project JSON files")
          PYEOF

      - name: Download missing WebR assets
        run: |
          # Shinylive 0.9.1 uses WebR v0.4.2 but the versioned CDN returns 403
          # for binary assets. Download R.bin.data from /latest/ endpoint.
          # R packages (shiny, bslib, etc.) are fetched at runtime by the
          # service worker from repo.r-wasm.org — no VFS self-hosting needed.
          WEBR_DIR=$(find _site -path "*/shinylive/webr" -type d | head -1)
          if [ -z "$WEBR_DIR" ]; then
            echo "::error::Cannot find shinylive/webr directory in _site"
            exit 1
          fi
          echo "WebR directory: $WEBR_DIR"
          CDN="https://webr.r-wasm.org/latest"
          if [ ! -f "$WEBR_DIR/R.bin.data" ]; then
            echo "Downloading R.bin.data from CDN..."
            curl -sfL "$CDN/R.bin.data" -o "$WEBR_DIR/R.bin.data" || {
              echo "::error::Failed to download R.bin.data from CDN"
              exit 1
            }
            echo "  -> $(stat -c%s "$WEBR_DIR/R.bin.data") bytes"
          else
            echo "R.bin.data already present"
          fi
          echo "WebR dir contents:"
          ls -la "$WEBR_DIR/" | head -20

      - name: Validate Shinylive assets
        run: |
          echo "=== Checking critical Shinylive/WebR assets ==="
          FAIL=0
          WEBR_DIR=$(find _site -path "*/shinylive/webr" -type d | head -1)
          for f in \
            "_site/shinylive-sw.js" \
            "$WEBR_DIR/webr.mjs" \
            "$WEBR_DIR/R.bin.data"; do
            if [ -f "$f" ]; then
              SIZE=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null)
              echo "OK: $f (${SIZE} bytes)"
            else
              echo "MISSING: $f"
              FAIL=1
            fi
          done
          echo "=== WebR directory listing ==="
          find "$WEBR_DIR" -type f | head -30
          echo "=== _site total size ==="
          du -sh _site/
          if [ "$FAIL" = "1" ]; then
            echo "::error::Critical Shinylive WebR assets are missing — app will fail to load"
            exit 1
          fi

      - name: Check rendered HTML for error patterns (pre-deploy)
        run: |
          echo "=== Checking rendered HTML for error patterns ==="
          FAIL=0
          for html_file in _site/index.html; do
            [ -f "$html_file" ] || continue
            HTML=$(cat "$html_file")
            for pat in "no method" "S3 class:" "could not find function"; do
              if echo "$HTML" | grep -iqE "$pat"; then
                MATCH=$(echo "$HTML" | grep -inE "$pat" | head -1)
                echo "::error::$html_file contains error pattern '$pat': $MATCH"
                FAIL=1
              fi
            done
          done
          if [ "$FAIL" = "1" ]; then
            echo "::error::Pre-deploy HTML check failed — aborting deployment"
            exit 1
          fi
          echo "Pre-deploy HTML check passed (index.html)"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployed parquet (DuckDB-WASM guard)
        run: |
          BASE="https://johngavin.github.io/llmtelemetry"
          # Allow up to 60s for Pages propagation before checking the parquets
          sleep 60
          # Verify all three parquets deployed (#83 Phase 5: costs + git_commits added)
          for PARQUET_NAME in sessions.parquet costs.parquet git_commits.parquet; do
            PARQUET_URL="${BASE}/data/v1/${PARQUET_NAME}"
            echo "Verifying deployed parquet at ${PARQUET_URL}..."
            HTTP_STATUS=$(curl -s -o /tmp/parquet_check -w "%{http_code}" "$PARQUET_URL")
            if [ "$HTTP_STATUS" != "200" ]; then
              echo "::error::${PARQUET_URL} returned HTTP ${HTTP_STATUS} (expected 200)"
              exit 1
            fi
            DEPLOYED_SIZE=$(stat -c%s /tmp/parquet_check 2>/dev/null || stat -f%z /tmp/parquet_check 2>/dev/null || echo "0")
            if [ "$DEPLOYED_SIZE" -lt 1024 ]; then
              echo "::error::Deployed parquet at ${PARQUET_URL} is too small (${DEPLOYED_SIZE} bytes, expected >=1024)"
              exit 1
            fi
            echo "OK: ${PARQUET_URL} — HTTP 200, ${DEPLOYED_SIZE} bytes"
          done

      - name: Verify deployment
        run: |
          echo "Waiting 30s for GitHub Pages propagation..."
          sleep 30
          BASE="https://johngavin.github.io/llmtelemetry"
          FAIL=0
          # Find the actual shinylive version dynamically; HTML has /shinylive/shinylive.css not /webr
          SHINYLIVE_VER=$(curl -s "${BASE}/" | grep -oP 'shinylive-\K[0-9.]+(?=/shinylive/)' | head -1)
          SHINYLIVE_VER="${SHINYLIVE_VER:-0.10.12}"
          WEBR_CHECK="/dashboard_shinylive_files/libs/quarto-contrib/shinylive-${SHINYLIVE_VER}/shinylive/webr/R.bin.data"
          for path in "/" "/shinylive-sw.js" \
                      "$WEBR_CHECK" \
                      "/data/index.json" "/data/gemini_daily.json" \
                      "/data/ccusage_sessions.json" \
                      "/data/gemini_sessions.json" "/data/cmonitor_summary.json" \
                      "/data/git_commits.json" \
                      "/data/unified_sessions.json" "/data/unified_costs.json"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${BASE}${path}")
            if [ "$STATUS" != "200" ]; then
              echo "FAIL: ${path} returned HTTP ${STATUS}"
              FAIL=1
            else
              echo "OK: ${path}"
            fi
          done
          # (#281 Phase 5a): legacy_ccusage_daily is a frozen snapshot — validate JSON if
          # present, but do not FAIL if absent or empty (deprecated, removal target 2026-09-02).
          curl -sf "${BASE}/data/gemini_daily.json" | python3 -m json.tool > /dev/null 2>&1 || {
            echo "FAIL: gemini_daily.json is not valid JSON"
            FAIL=1
          }
          ROWS=$(curl -sf "${BASE}/data/legacy_ccusage_daily.json" | python3 -c \
            "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
          if [ "$ROWS" = "0" ]; then
            echo "::warning::legacy_ccusage_daily.json absent or empty (deprecated Phase 5a)"
          else
            echo "OK: legacy_ccusage_daily.json ($ROWS rows, frozen snapshot)"
          fi
          # legacy_ccusage_blocks: deprecated Phase 5a — warning only if invalid JSON
          curl -sf "${BASE}/data/legacy_ccusage_blocks.json" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); assert isinstance(d,list), 'not an array'" 2>/dev/null \
            && echo "OK: legacy_ccusage_blocks.json (valid JSON array)" \
            || echo "::warning::legacy_ccusage_blocks.json absent or not a valid JSON array (deprecated Phase 5a)"
          # Check for "no data available" in critical JSON files
          echo "=== Checking for empty data files ==="
          for f in unified_sessions unified_costs git_commits git_velocity; do
            CONTENT=$(curl -sf "${BASE}/data/${f}.json" 2>/dev/null || echo "[]")
            if [ "$CONTENT" = "[]" ] || [ "$CONTENT" = "{}" ]; then
              echo "::warning::${f}.json is empty — dashboard will show 'No data available'"
              FAIL=1
            else
              ROWS=$(echo "$CONTENT" | python3 -c \
                "import sys,json; d=json.load(sys.stdin); print(len(d) if isinstance(d,list) else sum(len(v) for v in d.values() if isinstance(v,list)))" 2>/dev/null || echo "?")
              echo "OK: ${f}.json ($ROWS rows)"
            fi
          done
          # Stale data check: verify most recent session is within 48 hours
          echo "=== Checking session data freshness ==="
          LATEST=$(curl -sf "${BASE}/data/unified_sessions.json" 2>/dev/null | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['started_at'][:10] if d else 'EMPTY')" 2>/dev/null || echo "ERROR")
          TODAY=$(date -u +%Y-%m-%d)
          if [ "$LATEST" = "EMPTY" ] || [ "$LATEST" = "ERROR" ]; then
            echo "::warning::Could not extract latest session date"
          else
            echo "Latest session: $LATEST (today: $TODAY)"
            # Calculate days difference (simplified: just warn if not today or yesterday)
            if [ "$LATEST" != "$TODAY" ]; then
              YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d 2>/dev/null || date -u -v-1d +%Y-%m-%d 2>/dev/null || echo "")
              if [ "$LATEST" != "$YESTERDAY" ]; then
                echo "::warning::Session data may be stale (latest: $LATEST, today: $TODAY)"
              fi
            fi
          fi
          # Check rendered HTML for known error patterns (issue #69)
          echo "=== Checking rendered HTML for error patterns ==="
          HTML=$(curl -sf "${BASE}/" 2>/dev/null || echo "")
          for pat in "no method" "S3 class:" "could not find function"; do
            if echo "$HTML" | grep -iqE "$pat"; then
              MATCH=$(echo "$HTML" | grep -inE "$pat" | head -1)
              echo "::error::Dashboard HTML contains error pattern '$pat': $MATCH"
              FAIL=1
            fi
          done
          # Also check the dashboard_shinylive.html directly in case root is a different page
          DASH_HTML=$(curl -sf "${BASE}/dashboard_shinylive.html" 2>/dev/null || echo "")
          for pat in "no method" "S3 class:" "could not find function"; do
            if echo "$DASH_HTML" | grep -iqE "$pat"; then
              MATCH=$(echo "$DASH_HTML" | grep -inE "$pat" | head -1)
              echo "::error::dashboard_shinylive.html contains error pattern '$pat': $MATCH"
              FAIL=1
            fi
          done
          if [ "$FAIL" = "1" ]; then
            echo "::error::Some deployment health checks failed — inspect logs"
            exit 1
          else
            echo "All deployment checks passed"
          fi

      - name: Alert on failure — file/update tracking issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="Deploy run [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) failed at $(date -u +%FT%TZ).

          Commit: ${{ github.sha }}
          Branch: ${{ github.ref }}
          Tracked: JohnGavin/llmtelemetry#263"

          # Look for an existing open tracking issue; comment if exists, create if not.
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --label "ci-failure" --state open --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "$BODY"
          else
            gh issue create --repo "${{ github.repository }}" \
              --title "[CI failure] Dashboard deploy failed run ${{ github.run_id }}" \
              --body "$BODY" \
              --label "ci-failure"
          fi

      - name: Email on failure — out-of-band notification
        if: failure()
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
          REPO: ${{ github.repository }}
        run: |
          # Best-effort email. The GH-issue alert above is the durable record;
          # this is the out-of-band push so a human notices in real time.
          # Failures here MUST NOT fail the job (the deploy is already failed).
          Rscript -e '
          tryCatch({
            library(blastula)
            issues_url <- paste0("https://github.com/", Sys.getenv("REPO"),
                                 "/issues?q=is%3Aissue+label%3Aci-failure+state%3Aopen")
            body <- paste0(
              "## llmtelemetry — Dashboard deploy failed\n\n",
              "Run: [", Sys.getenv("RUN_ID"), "](", Sys.getenv("RUN_URL"), ")  \n",
              "Commit: `", Sys.getenv("COMMIT_SHA"), "`  \n",
              "Ref: `", Sys.getenv("REF"), "`  \n\n",
              "Tracking: [open ci-failure issues](", issues_url, ") — see also #263 design issue.\n\n",
              "See the run log for the failing step."
            )
            email <- compose_email(body = md(body))
            smtp_send(
              email = email,
              from = Sys.getenv("GMAIL_USERNAME"),
              to   = Sys.getenv("REPORT_RECIPIENT"),
              subject = paste0("[llmtelemetry CI] Dashboard deploy failed run ", Sys.getenv("RUN_ID")),
              credentials = creds_envvar(
                user = Sys.getenv("GMAIL_USERNAME"),
                pass_envvar = "GMAIL_APP_PASSWORD",
                provider = "gmail"
              )
            )
            cat("Failure email sent to ", Sys.getenv("REPORT_RECIPIENT"), "\n", sep = "")
          }, error = function(e) {
            cat("WARN: email step failed: ", conditionMessage(e), "\n", sep = "")
          })
          '
