name: Deploy Shinylive Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'vignettes/**'
      - 'inst/extdata/**'
      - 'inst/scripts/export_dashboard_data.R'
      - '.github/workflows/deploy-dashboard.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::jsonlite
            any::dplyr
            any::DBI
            any::duckdb
            any::here
            any::tibble
            any::shinylive
            any::knitr
            any::rmarkdown
            any::DT
            any::lubridate

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Install shinylive extension
        working-directory: vignettes
        run: quarto add quarto-ext/shinylive --no-prompt

      - name: Export dashboard data
        run: Rscript inst/scripts/export_dashboard_data.R

      - name: QA — validate exported data (fail early on empty/malformed)
        run: |
          echo "=== Data QA: checking for empty or malformed JSON ==="
          FAIL=0
          WARN=0
          DATA_DIR="vignettes/data"

          # Critical files: MUST have rows (error if empty)
          for f in ccusage_daily ccusage_blocks git_commits git_bus_factor \
                   git_velocity git_timing git_churn git_bugs; do
            FILE="$DATA_DIR/${f}.json"
            if [ ! -f "$FILE" ]; then
              echo "ERROR: $FILE missing"
              FAIL=1
              continue
            fi
            ROWS=$(python3 -c "
import json,sys
d=json.load(open('$FILE'))
if isinstance(d, list): print(len(d))
elif isinstance(d, dict):
  # Handle nested formats: {projects: {name: [rows]}} or {blocks: [rows]}
  total=0
  for v in d.values():
    if isinstance(v, list): total+=len(v)
    elif isinstance(v, dict):
      for vv in v.values():
        if isinstance(vv, list): total+=len(vv)
  print(total)
else: print(0)
" 2>/dev/null)
            if [ "$ROWS" = "0" ] || [ -z "$ROWS" ]; then
              echo "ERROR: $f.json has 0 rows — dashboard charts will show 'No data available'"
              FAIL=1
            else
              echo "OK: $f.json ($ROWS rows)"
            fi
          done

          # Optional files: warn if empty (not all environments have these)
          for f in gemini_daily gemini_sessions unified_sessions unified_costs git_tags git_crisis git_todo; do
            FILE="$DATA_DIR/${f}.json"
            if [ ! -f "$FILE" ]; then
              echo "WARN: $FILE missing (optional)"
              WARN=$((WARN+1))
              continue
            fi
            ROWS=$(python3 -c "import json; d=json.load(open('$FILE')); print(len(d) if isinstance(d,list) else sum(len(v) for v in d.values() if isinstance(v,list)))" 2>/dev/null)
            if [ "$ROWS" = "0" ] || [ -z "$ROWS" ]; then
              echo "WARN: $f.json is empty (optional data source)"
              WARN=$((WARN+1))
            else
              echo "OK: $f.json ($ROWS rows)"
            fi
          done

          echo ""
          echo "=== QA Summary: $FAIL errors, $WARN warnings ==="
          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL critical data files are empty — dashboard will have broken charts"
            exit 1
          fi

      - name: Render dashboard
        working-directory: vignettes
        run: quarto render dashboard_shinylive.qmd

      - name: Prepare pages artifact
        run: |
          mkdir -p _site
          cp vignettes/dashboard_shinylive.html _site/index.html
          cp -r vignettes/dashboard_shinylive_files _site/ 2>/dev/null || true
          cp vignettes/shinylive-sw.js _site/ 2>/dev/null || true
          cp -r vignettes/shinylive _site/ 2>/dev/null || true
          cp -r vignettes/data _site/data 2>/dev/null || true

      - name: Download missing WebR assets
        run: |
          # Shinylive 0.9.1 uses WebR v0.4.2 but the versioned CDN returns 403
          # for binary assets. Download R.bin.data from /latest/ endpoint.
          # R packages (shiny, bslib, etc.) are fetched at runtime by the
          # service worker from repo.r-wasm.org — no VFS self-hosting needed.
          WEBR_DIR=$(find _site -path "*/shinylive/webr" -type d | head -1)
          if [ -z "$WEBR_DIR" ]; then
            echo "::error::Cannot find shinylive/webr directory in _site"
            exit 1
          fi
          echo "WebR directory: $WEBR_DIR"
          CDN="https://webr.r-wasm.org/latest"
          if [ ! -f "$WEBR_DIR/R.bin.data" ]; then
            echo "Downloading R.bin.data from CDN..."
            curl -sfL "$CDN/R.bin.data" -o "$WEBR_DIR/R.bin.data" || {
              echo "::error::Failed to download R.bin.data from CDN"
              exit 1
            }
            echo "  -> $(stat -c%s "$WEBR_DIR/R.bin.data") bytes"
          else
            echo "R.bin.data already present"
          fi
          echo "WebR dir contents:"
          ls -la "$WEBR_DIR/" | head -20

      - name: Validate Shinylive assets
        run: |
          echo "=== Checking critical Shinylive/WebR assets ==="
          FAIL=0
          WEBR_DIR=$(find _site -path "*/shinylive/webr" -type d | head -1)
          for f in \
            "_site/shinylive-sw.js" \
            "$WEBR_DIR/webr.mjs" \
            "$WEBR_DIR/R.bin.data"; do
            if [ -f "$f" ]; then
              SIZE=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null)
              echo "OK: $f (${SIZE} bytes)"
            else
              echo "MISSING: $f"
              FAIL=1
            fi
          done
          echo "=== WebR directory listing ==="
          find "$WEBR_DIR" -type f | head -30
          echo "=== _site total size ==="
          du -sh _site/
          if [ "$FAIL" = "1" ]; then
            echo "::error::Critical Shinylive WebR assets are missing — app will fail to load"
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployment
        run: |
          echo "Waiting 30s for GitHub Pages propagation..."
          sleep 30
          BASE="https://johngavin.github.io/llmtelemetry"
          FAIL=0
          # Find the actual shinylive version path dynamically
          WEBR_PATH=$(curl -s "${BASE}/" | grep -oP 'shinylive-[0-9.]+/shinylive/webr' | head -1)
          WEBR_CHECK="/dashboard_shinylive_files/libs/quarto-contrib/${WEBR_PATH:-shinylive-0.10.8/shinylive/webr}/R.bin.data"
          for path in "/" "/shinylive-sw.js" \
                      "$WEBR_CHECK" \
                      "/data/index.json" "/data/ccusage_daily.json" "/data/gemini_daily.json" \
                      "/data/ccusage_sessions.json" "/data/ccusage_blocks.json" \
                      "/data/gemini_sessions.json" "/data/cmonitor_summary.json" \
                      "/data/git_commits.json" \
                      "/data/unified_sessions.json" "/data/unified_costs.json"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${BASE}${path}")
            if [ "$STATUS" != "200" ]; then
              echo "FAIL: ${path} returned HTTP ${STATUS}"
              FAIL=1
            else
              echo "OK: ${path}"
            fi
          done
          for f in ccusage_daily gemini_daily; do
            curl -sf "${BASE}/data/${f}.json" | python3 -m json.tool > /dev/null 2>&1 || {
              echo "FAIL: ${f}.json is not valid JSON"
              FAIL=1
            }
          done
          # Content QA: verify data files have rows
          for f in ccusage_daily ccusage_blocks; do
            ROWS=$(curl -sf "${BASE}/data/${f}.json" | python3 -c \
              "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
            if [ "$ROWS" = "0" ]; then
              echo "::warning::${f}.json has 0 rows"
              FAIL=1
            else
              echo "OK: ${f}.json ($ROWS rows)"
            fi
          done
          if [ "$FAIL" = "1" ]; then
            echo "::warning::Some deployment health checks failed — inspect logs"
          else
            echo "All deployment checks passed"
          fi
